<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepWise Portal</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2>Interview  Preparation Portal</h2>

            <ul>

    <li>
        <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>
    </li>

    <li>
        <a href="upload.html">
            <i class="fa-solid fa-upload"></i>
            Upload Resume
        </a>
    </li>

    <li>
        <a href="questions.html">
            <i class="fa-solid fa-file-lines"></i>
            Interview Questions
        </a>
    </li>

    <li>
        <a href="progress.html">
            <i class="fa-solid fa-chart-line"></i>
            Progress Tracker
        </a>
    </li>

    <li>
        <a href="login.html" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>
    </li>

</ul>

        </div>


        <!-- MAIN CONTENT -->

        <div class="main-content">

            <div class="top-bar">
                

                <div class="logo-section">

    <img src="images/logo.png.png" alt="Logo">

    <h2 id="welcomeMessage">PrepWisePortal</h2>

</div>

<p class="slogan">
    Your Smart Interview Preparation Companion
</p>
                <div class="profile" id="topProfile">
                    Hello
                </div>

            </div>


            <!-- CARDS -->

            <div class="cards">

                <div class="card">
                    <h3>Total Resumes</h3>
                    <p>12</p>
                </div>

                <div class="card">
                    <h3>Interview Questions</h3>
                    <p>120</p>
                </div>

                <div class="card">
                    <h3>Completed Topics</h3>
                    <p>8</p>
                </div>
                <div class="card">
                         <h3>Mock Interviews</h3>
                       <p>5</p>
             </div>

            </div>

        </div>

        <!-- RIGHT SIDEBAR -->

<div class="profile-section">

    <i class="fa-solid fa-circle-user profile-icon"></i>

    <h3 id="profileName"> </h3>

    <p id="profileEmail"></p>

    <hr>

</div>

</div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
